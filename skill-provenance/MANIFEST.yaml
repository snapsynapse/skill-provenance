bundle: skill-provenance
bundle_version: 4.5.0
bundle_date: 2026-03-06
description: >
  Metaskill for version tracking across Agent Skills sessions, surfaces,
  and platforms. Manifest, changelog, and portable internal version
  markers prevent version confusion during iterative skill development.

compatibility:
  designed_for:
    surfaces:
      - chat
      - cli
      - ide
      - api
    capabilities:
      - minimal SKILL.md frontmatter
      - local filesystem access
      - optional git workflow
  tested_on:
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Chat
      status: pass
      date: 2026-02-10
      notes: Full bootstrap and round-trip validated with .skill ZIP
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Code
      status: pass
      date: 2026-02-28
      notes: Full session protocol, validate.sh, git commit workflow
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Cowork
      status: pass
      date: 2026-02-28
      notes: Filesystem persistence, manifest verification
    - platform: OpenAI Codex
      model: N/A
      surface: CLI
      status: pass
      date: 2026-02-27
      notes: Minimal frontmatter mode, local editing workflow
    - platform: Google Gemini CLI
      model: Gemini 2.5 Pro
      surface: CLI
      status: partial
      date: 2026-02-27
      notes: Skill loading and bootstrap work. Gems workflow untested.
  compatible_with:
    - Claude API (/v1/skills)
    - Claude Agent SDK
    - GitHub Copilot / VS Code
    - Cursor
    - Any agentskills.io-compatible agent (30+ adopters)
  spec_version: agentskills.io/1.0
  frontmatter_mode: minimal

dependencies: []

files:
  - path: SKILL.md
    role: skill
    version: 8
    hash: sha256:d64bca74322dcb5c9a9b61d25999b8f54a2e11e89d25aa24a5e300f8d4c42de7
    note: Canonical skill definition. Version tracked in MANIFEST.yaml for maximum portability

  - path: README.md
    role: reference
    version: 10
    hash: sha256:a5481faa71bbdb62311491a434455275492ae3e0fb2e1409caac78fe334263f9
    note: Human-facing instructions, worked example, portability guidance, local validation, troubleshooting, references

  - path: evals.json
    role: evals
    version: 7
    hash: sha256:18318eec5f7057491a5187f96aef6ba278fe8187363dba9450dd2b5e9b70433e
    note: 15 evals covering bootstrap, verify, save, conflict, optional handoff, cross-platform, frontmatter mode, compatibility block, Gemini CLI, Gemini Gems, git commit messaging, per-file handoff, local validation, API surface, dependencies

  - path: CHANGELOG.md
    role: reference
    version: 10
    hash: sha256:941b4d5880920f2bd160be827cdf3e6f324dc990d0b8b1f15385d1fbc9378c5f
    note: Append-only change history

  - path: validate.sh
    role: script
    version: 5
    hash: sha256:333b6585a72818ae2d0196ef517bebf4e4b909e4a17405b526c6d1ec37be0406
    note: Zero-dependency bash script for local hash verification and update against MANIFEST.yaml
