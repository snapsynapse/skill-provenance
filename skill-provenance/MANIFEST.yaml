bundle: skill-provenance
bundle_version: 5.1.0
bundle_date: 2026-07-16
description: >
  Metaskill for portable provenance, integrity, and drift control across
  Agent Skills local folders, registries, platform uploads, and multi-agent
  sessions. Manifest, changelog, deployment notes, hashes, and portable
  internal version markers prevent version confusion during iterative
  skill development and cross-surface deployment.

compatibility:
  designed_for:
    surfaces:
      - chat
      - cli
      - ide
      - api
    capabilities:
      - metadata or minimal SKILL.md frontmatter
      - local filesystem access
      - optional git workflow
      - deployment drift tracking
      - hash-based audit trail
      - derived install and publish package generation
  tested_on:
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Chat
      status: pass
      date: 2026-02-10
      notes: Full bootstrap and round-trip validated with .skill ZIP
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Code
      status: pass
      date: 2026-02-28
      notes: Full session protocol, validate.sh, git commit workflow
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Cowork
      status: pass
      date: 2026-02-28
      notes: Filesystem persistence, manifest verification
    - platform: OpenAI Codex
      model: N/A
      surface: CLI
      status: pass
      date: 2026-02-27
      notes: Minimal frontmatter mode, local editing workflow
    - platform: Google Gemini CLI
      model: Gemini 2.5 Pro
      surface: CLI
      status: pass
      date: 2026-03-07
      notes: Skill loading, bootstrap, and Gems workflow validated.
    - platform: Perplexity Computer
      model: N/A
      surface: Computer
      status: pass
      date: 2026-03-07
      notes: .zip upload path works. Trigger-oriented description improves discovery.
  compatible_with:
    - Claude API (/v1/skills)
    - Claude Agent SDK
    - GitHub Copilot / VS Code
    - Cursor
    - Any agentskills.io-compatible agent (30+ adopters)
  spec_version: agentskills.io/1.0
  frontmatter_mode: metadata

dependencies: []

# Attestation records. Each entry binds a validation event to the exact
# bundle_version it validated, unlike compatibility.tested_on which records
# unbound design-time compatibility claims. Informational only: validate.sh
# reports these but never gates on them. Integrity gates, attestation informs.
validated_against:
  - bundle_version: 5.1.0
    harness: Anthropic Claude Code
    model: claude-fable-5
    date: 2026-07-16
    result: pass
    method: validate.sh verify + .github/scripts/test-validate.sh + release-surface-check.sh
    notes: >
      Full hash verification, validator regression suite, and release surface
      checks run clean on this harness/model pair at release time.

files:
  - path: SKILL.md
    role: skill
    version: 21
    hash: sha256:a0f040bee0d3e97a2660c9312974768edf93bc04d7c176765196e54e564d72c4
    note: Canonical skill definition with fail-closed hash semantics, explicit null opt-outs, optional validated_against attestation records, validate-only protocol guidance, package validation gates, origin metadata, and full provenance metadata in frontmatter.

  - path: README.md
    role: reference
    version: 24
    hash: sha256:6f9c7fe197533b9a7efd78d0a3f1d6b7e921521f927d857bd65fd3de90829fe5
    note: Human-facing instructions for fail-closed validation, explicit null opt-outs, update repair, validated_against attestation, GuideCheck verification, origin metadata, packaging, trust model, and troubleshooting

  - path: evals.json
    role: evals
    version: 13
    hash: sha256:4b468c60f52fbe81e1a65e15d1cf65ab5abdcff88dfa66bec2a3274b3ee9d8e2
    note: 35 core evals including validated_against attestation reporting, stale-attestation semantics, fail-closed missing or malformed hashes, explicit null opt-outs, update repair, and prior provenance, portability, deployment, validation, and trust workflows

  - path: evals-distribution.json
    role: evals
    version: 7
    hash: sha256:7978b9207a79ac23e4cd2ba7468e5de5d66d972f81eb2fcea08e56e6515247fb
    note: 17 supplemental evals covering GitHub Action shell safety, strict-platform and ClawHub packaging, origin metadata, release integrity, surface disclosure, and source-backed ecosystem workflows

  - path: CHANGELOG.md
    role: reference
    version: 27
    hash: sha256:65fc5508b7a4d83fd9beda8bd852430f4da5a915d3bbaaf5f42db9be5c42e3ab
    note: Active in-bundle changelog with the 5 most recent entries; older history lives in the repo root

  - path: validate.sh
    role: script
    version: 7
    hash: sha256:ed9df41cc14fdaa1a51ae0024d236c43cd6c62202400436f5032e6741aace28d
    note: Zero-dependency fail-closed hash verification and repair with explicit hash null opt-outs and informational validated_against attestation reporting

  - path: package.sh
    role: script
    version: 3
    hash: sha256:95f23c54b1f8a260c13cb71df353c1ce5ca17f6504efdce53808d42b46756b6b
    note: Zero-dependency bash script for derived strict-platform copies and ClawHub upload packages
