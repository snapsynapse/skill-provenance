    role: skill
    version: 18
    hash: sha256:ecb7a351a50fab3fac0e7113d355538a1c468249c6ed2935525c80090f5576dc
    note: Canonical skill definition with validate-only protocol guidance, package validation gate guidance, agentic surface disclosure, complementary-tool positioning, and full provenance metadata in frontmatter.

  - path: README.md
    role: reference
    version: 21
    hash: sha256:af290ea3cc3e0a107a1b38fb9eb570e3063e47c7c2cb37fd0309f78edf1f469b
    note: Human-facing instructions, GuideCheck pre-install verification, worked example, three-state bundle model, local validation, complementary-tool guidance, trust model, packaging, use case walkthroughs, troubleshooting, references

  - path: evals.json
