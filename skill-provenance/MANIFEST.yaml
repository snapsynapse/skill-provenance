bundle: skill-provenance
bundle_version: 4.10.1
bundle_date: 2026-05-25
description: >
  Metaskill for portable provenance, integrity, and drift control across
  Agent Skills local folders, registries, platform uploads, and multi-agent
  sessions. Manifest, changelog, deployment notes, hashes, and portable
  internal version markers prevent version confusion during iterative
  skill development and cross-surface deployment.

compatibility:
  designed_for:
    surfaces:
      - chat
      - cli
      - ide
      - api
    capabilities:
      - metadata or minimal SKILL.md frontmatter
      - local filesystem access
      - optional git workflow
      - deployment drift tracking
      - hash-based audit trail
      - derived install and publish package generation
  tested_on:
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Chat
      status: pass
      date: 2026-02-10
      notes: Full bootstrap and round-trip validated with .skill ZIP
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Code
      status: pass
      date: 2026-02-28
      notes: Full session protocol, validate.sh, git commit workflow
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Cowork
      status: pass
      date: 2026-02-28
      notes: Filesystem persistence, manifest verification
    - platform: OpenAI Codex
      model: N/A
      surface: CLI
      status: pass
      date: 2026-02-27
      notes: Minimal frontmatter mode, local editing workflow
    - platform: Google Gemini CLI
      model: Gemini 2.5 Pro
      surface: CLI
      status: pass
      date: 2026-03-07
      notes: Skill loading, bootstrap, and Gems workflow validated.
    - platform: Perplexity Computer
      model: N/A
      surface: Computer
      status: pass
      date: 2026-03-07
      notes: .zip upload path works. Trigger-oriented description improves discovery.
  compatible_with:
    - Claude API (/v1/skills)
    - Claude Agent SDK
    - GitHub Copilot / VS Code
    - Cursor
    - Any agentskills.io-compatible agent (30+ adopters)
  spec_version: agentskills.io/1.0
  frontmatter_mode: metadata

dependencies: []

files:
  - path: SKILL.md
    role: skill
    version: 17
    hash: sha256:a807adcaf21e01a49de933b75ad818d701a19ae7b2b701fb89cb68e75d90860a
    note: Canonical skill definition with validate-only protocol guidance, complementary-tool positioning, and full provenance metadata in frontmatter.

  - path: README.md
    role: reference
    version: 20
    hash: sha256:f8c89093739d9a392e9282bd532874f0055b23af19ceb5a5d881e77ce44213c0
    note: Human-facing instructions, GuideCheck pre-install verification, worked example, three-state bundle model, local validation, complementary-tool guidance, trust model, packaging, use case walkthroughs, troubleshooting, references

  - path: evals.json
    role: evals
    version: 11
    hash: sha256:a4466f3d4b2bc2b2374db6e04099e1c243a2706c020573d5ad3fbde49b0e8765
    note: 30 evals covering bootstrap, verify, save, conflict, optional handoff, cross-platform, frontmatter mode, compatibility block, Gemini CLI, Gemini Gems, git commit messaging, per-file handoff, local validation, API surface, dependencies, deployment drift, multi-surface installs, trust checks, redeploy events, deployment conflicts, hash mismatches, packaged subsets, Settings UI round-trip, Copilot/VS Code bootstrap, Cursor bootstrap, Cowork persistence, validate-only behavior, complementary-tool positioning, integrity trust model, derived-copy validation

  - path: evals-distribution.json
    role: evals
    version: 2
    hash: sha256:ba6036945d596afbec1c65216af4c51c2f9a66b618e0a794f07564c7a6908e6e
    note: 8 supplemental evals covering strict-platform copies, ClawHub package preparation, publish confirmation, registry installs versus canonical bundles, and repo-integrity checks for changelog retention, eval counts, inventory drift, and release metadata alignment

  - path: CHANGELOG.md
    role: reference
    version: 22
    hash: sha256:85426b0a422193f580443f4e85deded1e17286f296f3312037421c8c3e27f9ea
