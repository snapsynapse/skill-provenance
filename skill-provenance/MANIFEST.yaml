bundle: skill-provenance
bundle_version: 4.6.2
bundle_date: 2026-03-09
description: >
  Metaskill for version tracking across Agent Skills sessions, surfaces,
  and platforms. Manifest, changelog, deployment notes, and portable
  internal version markers prevent version confusion during iterative
  skill development and cross-surface deployment.

compatibility:
  designed_for:
    surfaces:
      - chat
      - cli
      - ide
      - api
    capabilities:
      - minimal SKILL.md frontmatter
      - local filesystem access
      - optional git workflow
      - deployment drift tracking
      - hash-based audit trail
  tested_on:
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Chat
      status: pass
      date: 2026-02-10
      notes: Full bootstrap and round-trip validated with .skill ZIP
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Code
      status: pass
      date: 2026-02-28
      notes: Full session protocol, validate.sh, git commit workflow
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Cowork
      status: pass
      date: 2026-02-28
      notes: Filesystem persistence, manifest verification
    - platform: OpenAI Codex
      model: N/A
      surface: CLI
      status: pass
      date: 2026-02-27
      notes: Minimal frontmatter mode, local editing workflow
    - platform: Google Gemini CLI
      model: Gemini 2.5 Pro
      surface: CLI
      status: partial
      date: 2026-02-27
      notes: Skill loading and bootstrap work. Gems workflow untested.
    - platform: Perplexity Computer
      model: N/A
      surface: Computer
      status: partial
      date: 2026-03-07
      notes: .zip upload path works. Trigger-oriented description improves discovery.
  compatible_with:
    - Claude API (/v1/skills)
    - Claude Agent SDK
    - GitHub Copilot / VS Code
    - Cursor
    - Any agentskills.io-compatible agent (30+ adopters)
  spec_version: agentskills.io/1.0
  frontmatter_mode: metadata

dependencies: []

deployments:
  clawhub:
    version: 4.6.2
    date: 2026-03-09
    url: https://clawhub.ai/skills/skill-provenance

files:
  - path: SKILL.md
    role: skill
    version: 11
    hash: sha256:9245dd495130acaecbadf6b107b2aeca91b303709a9611134ba257fb4f441ab6
    note: Canonical skill definition. Version tracked in MANIFEST.yaml for maximum portability

  - path: README.md
    role: reference
    version: 12
    hash: sha256:de23a7f4a83c17e1b673fdcbb032bfd0b75b940a72aa160c20d75c3907dd52d2
    note: Human-facing instructions, worked example, portability guidance, local validation, troubleshooting, references

  - path: evals.json
    role: evals
    version: 9
    hash: sha256:ae0820d58bcb1fd4c2ec511601a7a00ccf52e43f7eb3845cb799ea1967778cae
    note: 22 evals covering bootstrap, verify, save, conflict, optional handoff, cross-platform, frontmatter mode, compatibility block, Gemini CLI, Gemini Gems, git commit messaging, per-file handoff, local validation, API surface, dependencies, deployment drift, multi-surface installs, trust checks, redeploy events, deployment conflicts, hash mismatches, packaged subsets

  - path: CHANGELOG.md
    role: reference
    version: 14
    hash: sha256:37ff5975d32b289978d4660354a80d83643e9858c7d79dc92ea209075c93bd61
    note: Append-only change history

  - path: validate.sh
    role: script
    version: 5
