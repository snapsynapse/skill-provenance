bundle: skill-provenance
bundle_version: 6.0.0
bundle_date: 2026-07-21
description: >
  Metaskill for portable provenance, integrity, and drift control across
  Agent Skills local folders, registries, platform uploads, and multi-agent
  sessions. Manifest, changelog, deployment notes, hashes, and portable
  internal version markers prevent version confusion during iterative
  skill development and cross-surface deployment.

compatibility:
  designed_for:
    surfaces:
      - chat
      - cli
      - ide
      - api
    capabilities:
      - metadata or minimal SKILL.md frontmatter
      - local filesystem access
      - optional git workflow
      - deployment drift tracking
      - hash-based audit trail
      - derived install and publish package generation
  tested_on:
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Chat
      status: pass
      date: 2026-02-10
      notes: Full bootstrap and round-trip validated with .skill ZIP
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Code
      status: pass
      date: 2026-02-28
      notes: Full session protocol, validate.sh, git commit workflow
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Cowork
      status: pass
      date: 2026-02-28
      notes: Filesystem persistence, manifest verification
    - platform: OpenAI Codex
      model: N/A
      surface: CLI
      status: pass
      date: 2026-02-27
      notes: Minimal frontmatter mode, local editing workflow
    - platform: Google Gemini CLI
      model: Gemini 2.5 Pro
      surface: CLI
      status: pass
      date: 2026-03-07
      notes: Skill loading, bootstrap, and Gems workflow validated.
    - platform: Perplexity Computer
      model: N/A
      surface: Computer
      status: pass
      date: 2026-03-07
      notes: .zip upload path works. Trigger-oriented description improves discovery.
  compatible_with:
    - Claude API (/v1/skills)
    - Claude Agent SDK
    - GitHub Copilot / VS Code
    - Cursor
    - Any agentskills.io-compatible agent (30+ adopters)
  spec_version: agentskills.io/1.0
  frontmatter_mode: metadata

dependencies: []

# Attestation records. Each entry binds a validation event to the exact
# bundle_version it validated, unlike compatibility.tested_on which records
# unbound design-time compatibility claims. Informational only: validate.sh
# reports these but never gates on them. Integrity gates, attestation informs.
validated_against:
  - bundle_version: 5.1.0
    harness: Anthropic Claude Code
    model: claude-fable-5
    date: 2026-07-16
    result: pass
    method: validate.sh verify + .github/scripts/test-validate.sh + release-surface-check.sh
    notes: >
      Full hash verification, validator regression suite, and release surface
      checks run clean on this harness/model pair at release time.
  - bundle_version: 6.0.0
    harness: OpenAI Codex desktop
    model: GPT-5
    date: 2026-07-21
    result: pass
    method: validate.sh verify + adversarial regression suite + derived package validation + release-surface-check.sh
    notes: >
      Path traversal, ambiguous grammar, duplicate entry, symlink component,
      null-opt-out reporting, 1000-entry resource, strict package, and ClawHub
      package checks passed under Bash 5.3 and macOS system Bash 3.2.
      Attestation remains informational.

files:
  - path: SKILL.md
    role: skill
    version: 23
    hash: sha256:cffb5bf706c914813d3950be5c86d5d048b2b72bd6d2d1fb828fc6ca05410750
    note: Canonical skill definition with constrained manifest grammar, exact package inventory, evidence-based staleness, malformed-attestation warnings, package validation gates, origin metadata, and full provenance metadata in frontmatter

  - path: README.md
    role: reference
    version: 26
    hash: sha256:4ead7376384ca04c968509392f917462348ec8acb1b92574d4325389a7df6011
    note: Human-facing instructions for constrained manifest paths, exact package inventory, fail-closed validation, update repair, malformed and stale attestation, packaging, trust model, and troubleshooting

  - path: evals.json
    role: evals
    version: 15
    hash: sha256:fcd3c550dc39b791993acbe990fd6ea0b272d92ea4415c1bf8be14f1d775f0cc
    note: 39 core evals including files-section scope, malformed attestation, exact package inventory, unsafe paths, duplicates, symlinks, fail-closed hashes, and prior provenance, portability, deployment, validation, and trust workflows

  - path: evals-distribution.json
    role: evals
    version: 9
    hash: sha256:b53948f070b012533ad851e508e0d8640a2e79d00286d78368bee90ea783e624
    note: 17 supplemental evals after consolidating dirty-source package gating, covering package-boundary safety, GitHub Action shell safety, derived packaging, origin metadata, release integrity, surface disclosure, and source-backed ecosystem workflows

  - path: CHANGELOG.md
    role: reference
    version: 29
    hash: sha256:0622bbc982356fb5da15ee5fa2bfaa43a19258b5fbc2f350c8925580554f8d07
    note: Active in-bundle changelog with the 5 most recent entries; older history lives in the repo root

  - path: validate.sh
    role: script
    version: 9
    hash: sha256:cac9624665345d317fd37edf183defd5553f8a2afaed736c07f58f597ae55c05
    note: Zero-dependency constrained manifest parsing, path and symlink enforcement, fail-closed hash verification and repair, explicit null opt-outs, and non-gating malformed, stale, or matching validated_against reporting

  - path: package.sh
    role: script
    version: 5
    hash: sha256:6bcdd97f4c0b02782c4bc7e429c3d83007ac2e8803c7f15110ac775f867b6439
    note: Zero-dependency derived-package builder that delegates both derived hash updates and boundary verification to canonical validate.sh
