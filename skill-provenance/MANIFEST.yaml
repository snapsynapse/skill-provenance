bundle: skill-provenance
bundle_version: 5.0.0
bundle_date: 2026-07-10
description: >
  Metaskill for portable provenance, integrity, and drift control across
  Agent Skills local folders, registries, platform uploads, and multi-agent
  sessions. Manifest, changelog, deployment notes, hashes, and portable
  internal version markers prevent version confusion during iterative
  skill development and cross-surface deployment.

compatibility:
  designed_for:
    surfaces:
      - chat
      - cli
      - ide
      - api
    capabilities:
      - metadata or minimal SKILL.md frontmatter
      - local filesystem access
      - optional git workflow
      - deployment drift tracking
      - hash-based audit trail
      - derived install and publish package generation
  tested_on:
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Chat
      status: pass
      date: 2026-02-10
      notes: Full bootstrap and round-trip validated with .skill ZIP
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Code
      status: pass
      date: 2026-02-28
      notes: Full session protocol, validate.sh, git commit workflow
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Cowork
      status: pass
      date: 2026-02-28
      notes: Filesystem persistence, manifest verification
    - platform: OpenAI Codex
      model: N/A
      surface: CLI
      status: pass
      date: 2026-02-27
      notes: Minimal frontmatter mode, local editing workflow
    - platform: Google Gemini CLI
      model: Gemini 2.5 Pro
      surface: CLI
      status: pass
      date: 2026-03-07
      notes: Skill loading, bootstrap, and Gems workflow validated.
    - platform: Perplexity Computer
      model: N/A
      surface: Computer
      status: pass
      date: 2026-03-07
      notes: .zip upload path works. Trigger-oriented description improves discovery.
  compatible_with:
    - Claude API (/v1/skills)
    - Claude Agent SDK
    - GitHub Copilot / VS Code
    - Cursor
    - Any agentskills.io-compatible agent (30+ adopters)
  spec_version: agentskills.io/1.0
  frontmatter_mode: metadata

dependencies: []

files:
  - path: SKILL.md
    role: skill
    version: 20
    hash: sha256:b2fddacaf2ab27976679b3329c98f466be74c1b54a15552d5108f0818e20211d
    note: Canonical skill definition with fail-closed hash semantics, explicit null opt-outs, validate-only protocol guidance, package validation gates, origin metadata, and full provenance metadata in frontmatter.

  - path: README.md
    role: reference
    version: 23
    hash: sha256:4cdc97bc14724083dde8743b5e26d428ec6fd94eae2e0310572932c09ef07fbf
    note: Human-facing instructions for fail-closed validation, explicit null opt-outs, update repair, GuideCheck verification, origin metadata, packaging, trust model, and troubleshooting

  - path: evals.json
    role: evals
    version: 12
    hash: sha256:e9090f14f61b8e9763a0a459047f3d570240c475fd00765e82b45da35890b6a3
    note: 33 core evals including fail-closed missing or malformed hashes, explicit null opt-outs, update repair, and prior provenance, portability, deployment, validation, and trust workflows

  - path: evals-distribution.json
    role: evals
    version: 7
    hash: sha256:7978b9207a79ac23e4cd2ba7468e5de5d66d972f81eb2fcea08e56e6515247fb
    note: 17 supplemental evals covering GitHub Action shell safety, strict-platform and ClawHub packaging, origin metadata, release integrity, surface disclosure, and source-backed ecosystem workflows

  - path: CHANGELOG.md
    role: reference
    version: 26
    hash: sha256:84a6547790e3d5cce71d94cbad1e61afb0828072c8221ed07ea1e111ae301890
    note: Active in-bundle changelog with the 5 most recent entries; older history lives in the repo root

  - path: validate.sh
    role: script
    version: 6
    hash: sha256:b02781db6192e4e7c16e42a99d85ad7e0c3493bf89c811ede71f44d8de64cf08
    note: Zero-dependency fail-closed hash verification and repair with explicit hash null opt-outs

  - path: package.sh
    role: script
    version: 3
    hash: sha256:95f23c54b1f8a260c13cb71df353c1ce5ca17f6504efdce53808d42b46756b6b
    note: Zero-dependency bash script for derived strict-platform copies and ClawHub upload packages
