bundle: skill-provenance
bundle_version: 6.0.0
bundle_date: 2026-07-21
description: >
  Metaskill for portable provenance, integrity, and drift control across
  Agent Skills local folders, registries, platform uploads, and multi-agent
  sessions. Manifest, changelog, deployment notes, hashes, and portable
  internal version markers prevent version confusion during iterative
  skill development and cross-surface deployment.

compatibility:
  designed_for:
    surfaces:
      - chat
      - cli
      - ide
      - api
    capabilities:
      - metadata or minimal SKILL.md frontmatter
      - local filesystem access
      - optional git workflow
      - deployment drift tracking
      - hash-based audit trail
      - derived install and publish package generation
  tested_on:
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Chat
      status: pass
      date: 2026-02-10
      notes: Full bootstrap and round-trip validated with .skill ZIP
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Code
      status: pass
      date: 2026-02-28
      notes: Full session protocol, validate.sh, git commit workflow
    - platform: Anthropic Claude
      model: Claude Opus 4.6
      surface: Cowork
      status: pass
      date: 2026-02-28
      notes: Filesystem persistence, manifest verification
    - platform: OpenAI Codex
      model: N/A
      surface: CLI
      status: pass
      date: 2026-02-27
      notes: Minimal frontmatter mode, local editing workflow
    - platform: Google Gemini CLI
      model: Gemini 2.5 Pro
      surface: CLI
      status: pass
      date: 2026-03-07
      notes: Skill loading, bootstrap, and Gems workflow validated.
    - platform: Perplexity Computer
      model: N/A
      surface: Computer
      status: pass
      date: 2026-03-07
      notes: .zip upload path works. Trigger-oriented description improves discovery.
  compatible_with:
    - Claude API (/v1/skills)
    - Claude Agent SDK
    - GitHub Copilot / VS Code
    - Cursor
    - Any agentskills.io-compatible agent (30+ adopters)
  spec_version: agentskills.io/1.0
  frontmatter_mode: metadata

dependencies: []

# Attestation records. Each entry binds a validation event to the exact
# bundle_version it validated, unlike compatibility.tested_on which records
# unbound design-time compatibility claims. Informational only: validate.sh
# reports these but never gates on them. Integrity gates, attestation informs.
validated_against:
  - bundle_version: 5.1.0
    harness: Anthropic Claude Code
    model: claude-fable-5
    date: 2026-07-16
    result: pass
    method: validate.sh verify + .github/scripts/test-validate.sh + release-surface-check.sh
    notes: >
      Full hash verification, validator regression suite, and release surface
      checks run clean on this harness/model pair at release time.
  - bundle_version: 6.0.0
    harness: OpenAI Codex desktop
    model: GPT-5
    date: 2026-07-21
    result: pass
    method: validate.sh verify + adversarial regression suite + derived package validation + release-surface-check.sh
    notes: >
      Path traversal, ambiguous grammar, duplicate entry, symlink component,
      null-opt-out reporting, 1000-entry resource, strict package, and ClawHub
      package checks passed under Bash 5.3 and macOS system Bash 3.2.
      Attestation remains informational.

files:
  - path: SKILL.md
    role: skill
    version: 22
    hash: sha256:19e52672b9342548e81c6d85536272ef46bb454ab630f8b20ffab63a8a1cec4e
    note: Canonical skill definition with constrained manifest path grammar, symlink and duplicate-path rejection, fail-closed hash semantics, optional validated_against attestation records, package validation gates, origin metadata, and full provenance metadata in frontmatter.

  - path: README.md
    role: reference
    version: 25
    hash: sha256:43fe61f0c1d7af3f5f0f019863dab0e60c937d7f568a4f965d57f2a8c259dc7e
    note: Human-facing instructions for constrained manifest paths, symlink and duplicate rejection, fail-closed validation, update repair, validated_against attestation, packaging, trust model, and troubleshooting

  - path: evals.json
    role: evals
    version: 14
    hash: sha256:053127bc60dbffa330c7e7452378754c27f6f14898d148c62beb42fdc65a00c6
    note: 37 core evals including unsafe and ambiguous path rejection, duplicate paths, symlinks, validated_against attestation, fail-closed hashes, update repair, and prior provenance, portability, deployment, validation, and trust workflows

  - path: evals-distribution.json
    role: evals
    version: 8
    hash: sha256:29bd03e67b392520fea2174952ea5a517e600ab4bc4360e0f8e1440df5dd1d86
    note: 18 supplemental evals covering package-boundary manifest safety, GitHub Action shell safety, strict-platform and ClawHub packaging, origin metadata, release integrity, surface disclosure, and source-backed ecosystem workflows

  - path: CHANGELOG.md
    role: reference
    version: 28
    hash: sha256:2bbcdaed5665422cf160e9fe72b2b06b43dceb66a70e8015de2e63db46637157
    note: Active in-bundle changelog with the 5 most recent entries; older history lives in the repo root

  - path: validate.sh
    role: script
    version: 8
    hash: sha256:761ca40f57adac003fdda3a6520e8e342f4afbc5fa6127b1a5127db70118071b
    note: Zero-dependency constrained manifest parsing, path and symlink boundary enforcement, fail-closed hash verification and repair, explicit null opt-outs, and informational validated_against reporting

  - path: package.sh
    role: script
    version: 4
    hash: sha256:161e5d2773d5a53080b1c159e394893a821054b900a7ddc01623c9f79326b9ea
    note: Zero-dependency derived-package builder that revalidates canonical manifest policy at each strict-platform and ClawHub package boundary
