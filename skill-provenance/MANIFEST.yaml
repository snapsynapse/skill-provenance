    role: skill
    version: 6
    hash: sha256:3d2e3169ed91200e5656cf7778b29adde94d2cd765e37ac2b0a91c4fbc7b2888
    note: Canonical skill definition. Version tracked in MANIFEST.yaml for maximum portability

  - path: README.md
    role: reference
    version: 8
    hash: sha256:3e813a745ce8381e0a6dc91bc418d278f59d76667d5379b399fdc326d441bc5e
    note: Human-facing instructions, worked example, portability guidance, local validation, troubleshooting, references

  - path: evals.json
    role: evals
    version: 6
    hash: sha256:48b89043498ffe1cd66bde26a59bcf6680ea55f76e8fbf4c7391bf8bfe91b3cb
    note: 13 evals covering bootstrap, verify, save, conflict, optional handoff, cross-platform, frontmatter mode, compatibility block, Gemini CLI, Gemini Gems, git commit messaging, per-file handoff, local validation

  - path: CHANGELOG.md
    role: reference
    version: 8
    hash: sha256:7b6d50d6ebc0c88691dac06465c8d34881ab4de44a42d593a3bc30334eb5724b
