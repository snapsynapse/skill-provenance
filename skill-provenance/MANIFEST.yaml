    hash: sha256:7cbc23e6b6e769baf41e16ec363f3f2731287d83ab025c1ec923bf07f8738081
    note: Canonical skill definition with validate-only protocol guidance, package validation gate guidance, agentic surface disclosure, complementary-tool positioning, optional origin metadata for derived copies, and full provenance metadata in frontmatter.

  - path: README.md
