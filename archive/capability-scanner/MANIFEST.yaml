description: >-
  Monitors the AI ecosystem for new features, providers, capabilities,
  and pricing changes relevant to the AI Capability Reference repository
  (snapsynapse/ai-capability-reference). Applies editorial judgment based
  on the project's ontology, scope rules, and inclusion criteria. Files
  GitHub issues for candidates that warrant additions or updates.

compatibility:
  designed_for:
    surfaces:
      - chat
    capabilities:
      - metadata frontmatter in SKILL.md
      - scheduled background tasks
      - web search
      - bash with curl for GitHub API
  tested_on:
