name: Validate bundle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify bundle hashes
        run: |
          chmod +x skill-provenance/validate.sh
          ./skill-provenance/validate.sh skill-provenance

      - name: Test strict package build
        run: |
          chmod +x skill-provenance/package.sh
          ./skill-provenance/package.sh strict /tmp/build/strict
          echo "Strict build OK"

      - name: Test clawhub package build
        run: |
          ./skill-provenance/package.sh clawhub /tmp/build/clawhub
          echo "ClawHub build OK"

      - name: Verify .skill ZIP structure
        run: |
          if [ -f skill-provenance.skill ]; then
            unzip -t skill-provenance.skill
            unzip -l skill-provenance.skill | grep -q "SKILL.md" || {
              echo "ERROR: SKILL.md not found in .skill archive"
              exit 1
            }
            echo ".skill ZIP structure OK"
          else
            echo "SKIP: no .skill file in repo root"
          fi# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
